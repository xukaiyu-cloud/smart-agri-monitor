<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2e7d32">
  <title>智慧农业监控系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  
  <!-- ========== 登录/注册页 ========== -->
  <div id="auth-page" class="auth-page">
    <div class="auth-bg">
      <div class="auth-bg-layer layer1"></div>
      <div class="auth-bg-layer layer2"></div>
      <div class="auth-bg-layer layer3"></div>
      <div class="auth-bg-layer layer4"></div>
      <div class="auth-bg-layer layer5"></div>
    </div>
    <div class="auth-overlay"></div>

    <!-- 居中玻璃卡片 -->
    <div class="auth-glass">
      <div class="auth-logo-circle">🌾</div>
      <h2 class="auth-heading" id="auth-heading">欢迎回来</h2>
      <p class="auth-desc" id="auth-desc">登录您的账号</p>

      <form id="auth-form" class="auth-fields">
        <input id="input-phone" type="tel" placeholder="手机号" autocomplete="tel" maxlength="11" class="auth-input" />
        <input id="input-pwd" type="password" placeholder="密码" autocomplete="current-password" maxlength="20" class="auth-input" />
        <div id="field-confirm" style="display:none">
          <input id="input-confirm" type="password" placeholder="确认密码" maxlength="20" class="auth-input" />
        </div>
        <p id="auth-error" class="auth-error"></p>
        <button type="button" id="auth-btn" class="auth-btn-full" >登 录</button>
      </form>

      <p class="auth-note">
        <span id="switch-text">还没有账号？</span>
        <a href="#" id="switch-link" class="auth-link">立即注册</a>
      </p>
    </div>

    <!-- 底部用户数 -->
    <div class="auth-footer">
      <p class="auth-footer-text">
        已有 <span id="auth-user-count">326</span> 位农户正在使用
      </p>
      <div class="auth-avatars">
        <div class="auth-avatar" style="background:#4caf50">👨‍🌾</div>
        <div class="auth-avatar" style="background:#2196f3">👩‍🌾</div>
        <div class="auth-avatar" style="background:#ff9800">👨‍🌾</div>
        <div class="auth-avatar" style="background:#9c27b0">👩‍🌾</div>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">

    <!-- ========== ① 顶部状态栏 ========== -->
    <header id="top-bar">
      <div class="top-left">
        <span class="logo">🌾</span>
        <h1 class="title">智慧农业监控</h1>
      </div>
      <div class="top-right">
        <span id="clock" class="clock">--:--:--</span>
        <span id="conn-status" class="conn-dot" title="连接状态"></span>
        <button id="btn-refresh" class="icon-btn" title="刷新">🔄</button>
      </div>
    </header>

    <!-- ========== ② 传感器面板 ========== -->
    <section id="sensor-panel" class="module">
      <div class="module-header">
        <h2>📡 传感器实时数据</h2>
        <span id="sensor-time" class="update-time"></span>
      </div>
      <div id="sensor-grid" class="sensor-grid">
        <!-- JS 动态渲染 5 个监测点卡片 -->
      </div>
    </section>

    <!-- ========== ③ 告警面板 ========== -->
    <section id="alert-panel" class="module">
      <div class="module-header">
        <h2>🚨 告警信息</h2>
        <span id="alert-count" class="badge">0</span>
      </div>
      <div id="alert-list" class="alert-list">
        <div class="alert-empty">✅ 当前无告警</div>
      </div>
    </section>

    <!-- ========== ④ 历史曲线 ========== -->
    <section id="chart-panel" class="module">
      <div class="module-header">
        <h2>📈 历史数据曲线</h2>
      </div>
      <div class="chart-controls">
        <label>监测点：
          <select id="chart-point">
            <option value="1">监测点 1</option>
            <option value="2">监测点 2</option>
            <option value="3">监测点 3</option>
            <option value="4">监测点 4</option>
            <option value="5">监测点 5</option>
          </select>
        </label>
        <span id="threshold-legend" class="threshold-legend"></span><label>指标：
          <select id="chart-field">
            <option value="temp">温度 (°C)</option>
            <option value="humidity">湿度 (%)</option>
            <option value="light">光照 (lx)</option>
            <option value="ph">土壤 pH</option>
          </select>
        </label>
      </div>
      <div id="chart-container" class="chart-box"></div>
    </section>

    <!-- ========== ⑤ 病虫害预警 ========== -->
    <section id="pest-panel" class="module">
      <div class="module-header">
        <h2>🐛 病虫害预警</h2>
        <button id="btn-pest-refresh" class="icon-btn" title="重新预测">🔄</button>
      </div>
      <div id="pest-gauge" class="chart-box chart-box-sm"></div>
      <div id="pest-detail" class="pest-detail">
        <div class="pest-card">
          <span class="pest-label">病害类型</span>
          <span id="pest-disease" class="pest-value">--</span>
        </div>
        <div class="pest-card">
          <span class="pest-label">发生概率</span>
          <span id="pest-prob" class="pest-value">--</span>
        </div>
        <div class="pest-card pest-advice">
          <span class="pest-label">💡 建议措施</span>
          <span id="pest-advice" class="pest-value">--</span>
        </div>
      </div>
    </section>

    <!-- ========== ⑥ 能耗面板 ========== -->
    <section id="energy-panel" class="module">
      <div class="module-header">
        <h2>⚡ 能耗优化</h2>
      </div>
      <div id="energy-total" class="energy-total">
        <span class="energy-num" id="energy-total-val">0</span>
        <span class="energy-unit">kWh (24h累计)</span>
      </div>
      <div id="energy-chart" class="chart-box chart-box-sm"></div>
      <div id="energy-tips" class="energy-tips">
        <!-- JS 动态渲染优化建议 -->
      </div>
    </section>

    <!-- ========== ⑦ 设备控制 ========== -->
    <section id="device-panel" class="module">
      <div class="module-header">
        <h2>🎛️ 设备控制</h2>
      </div>
      <div id="device-grid" class="device-grid">
        <!-- JS 动态渲染 5 个监测点的控制开关 -->
      </div>
    </section>

    <!-- ========== ⑧ 底部导航 ========== -->
    <nav id="bottom-nav">
      <a href="#sensor-panel" class="nav-item active" data-target="sensor-panel">
        <span class="nav-icon">📡</span>
        <span class="nav-label">监控</span>
      </a>
      <a href="#alert-panel" class="nav-item" data-target="alert-panel">
        <span class="nav-icon">🚨</span>
        <span class="nav-label">告警</span>
        <span id="nav-alert-badge" class="nav-badge" style="display:none">0</span>
      </a>
      <a href="#chart-panel" class="nav-item" data-target="chart-panel">
        <span class="nav-icon">📈</span>
        <span class="nav-label">图表</span>
      </a>
      <a href="#pest-panel" class="nav-item" data-target="pest-panel">
        <span class="nav-icon">🐛</span>
        <span class="nav-label">预警</span>
      </a>
    </nav>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="js/native.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
